(function () {
  const c = document.getElementById('mx');
  const x = c.getContext('2d');
  const CH = 'アイウエオカキクケコサシスセタチツナ01アBCDF@#%';
  let cols, drops;
  function resize() {
    c.width = innerWidth; c.height = innerHeight;
    cols = Math.floor(innerWidth / 16);
    drops = Array.from({ length: cols }, () => Math.random() * innerHeight / 16);
  }
  resize();
  addEventListener('resize', resize);
  setInterval(() => {
    x.fillStyle = 'rgba(0,0,0,.05)';
    x.fillRect(0, 0, c.width, c.height);
    x.fillStyle = '#7ecfa0';
    x.font = '14px monospace';
    drops.forEach((y, i) => {
      x.fillText(CH[Math.floor(Math.random() * CH.length)], i * 16, y * 16);
      if (y * 16 > c.height && Math.random() > .978) drops[i] = 0;
      else drops[i] += 1;
    });
  }, 60);
})();

let bi = 0, barEl = null;

function runBoot() {
  if (bi >= BOOT.length) {
    animateBar(() => {
      setTimeout(() => {
        const boot = document.getElementById('boot');
        boot.style.transition = 'opacity .55s ease';
        boot.style.opacity = '0';
        setTimeout(() => { boot.style.display = 'none'; startTerm(); }, 560);
      }, 200);
    });
    return;
  }
  const s = BOOT[bi++];
  const d = document.createElement('div');
  d.className = s.c;
  d.textContent = s.t;
  if (s.bar) {
    barEl = d;
    blines.appendChild(d);
    // We'll animate after all lines are printed
  } else {
    if (s.t === '' && bi > 2) { /* skip big gap at end */ }
    blines.appendChild(d);
  }
  window.scrollTo(0, 9999);
  setTimeout(runBoot, s.t === '' ? 60 : 95);
}

function animateBar(done) {
  if (!barEl) { done(); return; }
  const fills = '████████████████████';
  let p = 0;
  const iv = setInterval(() => {
    p++;
    const filled = fills.slice(0, Math.floor(p / 5));
    const empty  = '                    '.slice(filled.length);
    barEl.textContent = `Loading  [${filled}${empty}]  ${p}%`;
    window.scrollTo(0, 9999);
    if (p >= 100) { clearInterval(iv); setTimeout(done, 200); }
  }, 18);
}
